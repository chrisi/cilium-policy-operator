apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: predefinedendpointcatalog.cilium.airplus.com
spec:
  group: cilium.airplus.com
  names:
    kind: PredefinedEndpointCatalog
    listKind: PredefinedEndpointCatalogList
    plural: predefinedendpointcatalogs
    singular: predefinedendpointcatalog
    shortNames:
      - pec
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      subresources:
        status: { }
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                targets:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      address:
                        type: string
                      port:
                        type: string
                      protocol:
                        type: string
            status:
              type: object
              properties:
                status:
                  type: string
