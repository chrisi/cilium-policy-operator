apiVersion: v1
kind: ServiceAccount
metadata:
  name: cilium-policy-operator
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cilium-policy-operator
rules:
  - apiGroups: [ "cilium.airplus.com" ]
    resources: [ "targetsystems", "targetsystems/status", "targetsystems/finalizers" ]
    verbs: [ "get", "list", "watch", "create", "update", "patch", "delete" ]
  - apiGroups: [ "networking.k8s.io" ]
    resources: [ "networkpolicies" ]
    verbs: [ "get", "list", "watch", "create", "update", "patch", "delete" ]
  - apiGroups: [ "cilium.io" ]
    resources: [ "ciliumnetworkpolicies", "ciliumclusterwidenetworkpolicies" ]
    verbs: [ "get", "list", "watch", "create", "update", "patch", "delete" ]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cilium-policy-operator
subjects:
  - kind: ServiceAccount
    name: cilium-policy-operator
    namespace: default
roleRef:
  kind: ClusterRole
  name: cilium-policy-operator
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cilium-policy-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cilium-policy-operator
  template:
    metadata:
      labels:
        app: cilium-policy-operator
    spec:
      serviceAccountName: cilium-policy-operator
      containers:
        - name: app
          image: cilium-policy-operator:0.0.1-SNAPSHOT
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: cilium-policy-operator
spec:
  selector:
    app: cilium-policy-operator
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP